name: CI Gates

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install JAX dependencies
        run: |
          pip install hatch
          pip install -e .[dev]

      - name: Install JS dependencies
        run: pnpm install

      - name: Audit PORT-BRANCH Registry
        run: python3 scripts/verify_branch_coverage.py

      - name: Verify Fixture Contracts (Pytest)
        run: pytest

      - name: Verify Browser Port (Vitest)
        run: pnpm test

      - name: Run Metamorphic / Invariant Tests
        run: echo "Run gradient & invariant test suites here once extracted"
